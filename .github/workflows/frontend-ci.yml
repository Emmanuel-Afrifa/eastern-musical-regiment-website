name: Frontend CI

on:
    push:
        branches: [main]
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
        branches: [main]

jobs:
    frontend-tests:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: frontend
        
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node js
              uses: actions/setup-node@v4
              with:
                node-version: 22
                cache: npm
                cache-dependancy-path: frontend/package-lock.json
            
            - name: Install Dependencies
              run: npm ci

            - name: Run Tests
              run: npm test


